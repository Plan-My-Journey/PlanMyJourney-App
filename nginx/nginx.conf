upstream user_service    { server user-service:8000; }
upstream travel_service  { server travel-service:8000; }
upstream ai_service      { server ai-service:8000; }
upstream utility_service { server utility-service:8000; }

server {
    listen 8000;
    server_name _;

    # Health check endpoint (mirrors ALB target group health check)
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # --- auth + users → user-service ---
    # Strips /api/ prefix: /api/auth/login → /auth/login
    location ~ ^/api/(auth|users) {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://user_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # --- trips + expenses + trip-history → travel-service ---
    # Strips /api/ prefix: /api/trips → /trips
    location ~ ^/api/(trips|expenses|trip-history) {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://travel_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # --- ai → ai-service ---
    # Strips /api/ prefix: /api/ai/chat → /ai/chat
    location ~ ^/api/ai {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://ai_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # --- weather + hotels + places → utility-service ---
    # Strips /api/ prefix: /api/weather/Kyoto → /weather/Kyoto
    location ~ ^/api/(weather|hotels|places) {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://utility_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Catch-all: return 404 for unmatched /api/* routes
    location /api/ {
        return 404 '{"detail": "No upstream route for this path"}';
        add_header Content-Type application/json;
    }
}

