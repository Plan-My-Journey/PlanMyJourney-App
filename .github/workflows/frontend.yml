name: CI/CD - frontend

# Frontend: S3 + CloudFront (dev and prod). No EKS/ArgoCD for frontend.
# dev push: scan → build once → S3 dev → smoke → record validation
# PR dev→main: artifact validation
# main push: production approval → promote static artifact dev→prod S3

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  push:
    branches: [dev, main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  lint:
    if: (github.event_name == 'pull_request' && github.base_ref == 'dev') || (github.event_name == 'push' && github.ref == 'refs/heads/dev')
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_lint.yml@main
    with:
      service-path: frontend
      runtime: node

  sast:
    if: (github.event_name == 'pull_request' && github.base_ref == 'dev') || (github.event_name == 'push' && github.ref == 'refs/heads/dev')
    needs: [lint]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_sast.yml@main
    with:
      service-path: frontend/src
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca:
    if: (github.event_name == 'pull_request' && github.base_ref == 'dev') || (github.event_name == 'push' && github.ref == 'refs/heads/dev')
    needs: [sast]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_sca.yml@main
    with:
      service-name: frontend
      service-path: frontend
      runtime: node
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  quality-gate:
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs: [lint, sast, sca]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_quality-gate.yml@main
    with:
      lint-result: ${{ needs.lint.result }}
      sast-result: ${{ needs.sast.result }}
      sca-result: ${{ needs.sca.result }}
      trivy-result: skipped

  frontend-build:
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs: [quality-gate]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_frontend-build.yml@main
    with:
      api-url: https://dev-api.invest-iq.online/api

  frontend-s3-deploy-dev:
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs: [frontend-build]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_frontend-s3-deploy.yml@main
    with:
      deploy-environment: dev
      frontend-bucket: ${{ vars.FRONTEND_BUCKET_DEV || 'ai-travel-frontend-dev' }}
      cloudfront-distribution-id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_DEV || 'PLACEHOLDER' }}
      artifact-tag: sha-${{ github.sha }}
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  smoke-test:
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs: [frontend-s3-deploy-dev]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_smoke-test.yml@main
    with:
      target-environment: dev
      s3-bucket: ${{ vars.FRONTEND_BUCKET_DEV || 'ai-travel-frontend-dev' }}
      skip-api-check: true
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  record-artifact-validation:
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs: [smoke-test]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_record-artifact-validation.yml@main
    with:
      service-name: frontend
      artifact-tag: sha-${{ github.sha }}
      artifact-type: static

  artifact-validation:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_artifact-validation.yml@main
    with:
      service-name: frontend
      artifact-type: static
      dev-bucket: ${{ vars.FRONTEND_BUCKET_DEV || 'ai-travel-frontend-dev' }}
      dev-url: https://dev.invest-iq.online
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}

  prod-approval:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_production-gate.yml@main
    with:
      service-name: frontend

  frontend-s3-promote:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [prod-approval]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_frontend-s3-promote.yml@main
    with:
      source-bucket: ${{ vars.FRONTEND_BUCKET_DEV || 'ai-travel-frontend-dev' }}
      destination-bucket: ${{ vars.FRONTEND_BUCKET_PROD || 'invest-iq-online-frontend' }}
      cloudfront-distribution-id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_PROD || 'E22TQX283Z4MH2' }}
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  notify-sast:
    if: ${{ always() && github.event_name == 'pull_request' && github.base_ref == 'dev' && needs.sast.outputs.quality-gate-failed == 'true' }}
    needs: [sast]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_notify.yml@main
    with:
      subject: "[SAST] SonarCloud quality gate failed — frontend"
      body: "SonarCloud quality gate failed on this pull request."
      service-name: frontend
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

  pr-comment:
    if: ${{ always() && github.event_name == 'pull_request' && github.base_ref == 'dev' }}
    needs: [lint, sast, sca]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_pr-comment.yml@main
    with:
      service-name: frontend
      lint: ${{ needs.lint.result }}
      sast: ${{ needs.sast.result }}
      sca: ${{ needs.sca.result }}
      trivy: skipped
# ci: trigger dev pipelines
