name: Promotion — dev to main

# Trigger: pull request dev → main
# No SonarCloud, Snyk, or quality gate re-runs.
# Reviewer approval is enforced via branch protection rules.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  promotion-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const marker = '<!-- promotion-dev-to-main -->';
            const body = [
              marker,
              '### Promotion PR (dev → main)',
              '',
              'Security validation was completed on the original **feature → dev** pull request.',
              '',
              'This promotion PR intentionally **does not re-run** SonarCloud, Snyk, or quality gates.',
              '',
              '**Required before merge:**',
              '- ✅ 1 reviewer approval (branch protection)',
              '- ✅ Resolved conversations',
              '- ✅ Up-to-date branch',
              '',
              '**After merge to `main`:** no build, deploy, or GitOps update runs automatically.',
              'Production releases are triggered manually via the **Release** workflow (`workflow_dispatch`).',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
