name: SonarCloud One-Time Setup

# Fixes private-project and master-branch issues via SonarCloud API.
# Run once from Actions tab, then re-run service CI workflows.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SonarCloud token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/authentication/validate" \
            | tee /tmp/validate.json
          echo "SonarCloud token is valid."

      - name: Verify project and organization
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT: Plan-My-Journey_planmyjourney-app
          ORG: plan-my-journey
        run: |
          set -euo pipefail
          curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/components/show?component=${PROJECT}&organization=${ORG}" \
            | tee /tmp/project.json
          echo "Project ${PROJECT} found in organization ${ORG}."

      - name: Make project public (required for free SonarCloud scans)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT: Plan-My-Journey_planmyjourney-app
        run: |
          set -euo pipefail
          curl -sf -X POST -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/projects/update_visibility?project=${PROJECT}&visibility=public"
          echo "Project visibility set to public."

      - name: Rename master branch to main if needed
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT: Plan-My-Journey_planmyjourney-app
        run: |
          set -euo pipefail
          if curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/project_branches/list?project=${PROJECT}" \
            | grep -q '"name":"master"'; then
            curl -sf -X POST -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/project_branches/rename?project=${PROJECT}&name=master&newName=main"
            echo "Renamed branch master -> main."
          else
            echo "No master branch to rename (already using main/dev)."
          fi

      - name: Set main branch to main
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT: Plan-My-Journey_planmyjourney-app
        run: |
          set -euo pipefail
          curl -sf -X POST -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/project_branches/set_main_branch?project=${PROJECT}&branch=main" \
            || echo "Main branch already set or will be created on first main analysis."
          echo "SonarCloud setup complete."
