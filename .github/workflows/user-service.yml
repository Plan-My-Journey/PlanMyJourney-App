name: CI/CD - user-service

# Pull request to dev or main -> validate only (SAST -> SCA -> build image + Trivy)
# Push to main              -> build, push SHA tag to ECR, GitOps dev deploy, ArgoCD sync
# workflow_dispatch ci       -> same as PR validation, run manually on any branch
# workflow_dispatch dev-deploy -> same as push to main, build + deploy to dev manually
# workflow_dispatch release  -> version guard -> publish semver -> git tag -> prod CD

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "services/user-service/**"
      - "docker/user-service/**"
      - ".github/workflows/user-service.yml"
  push:
    branches: [main]
    paths:
      - "services/user-service/**"
      - "docker/user-service/**"
      - ".github/workflows/user-service.yml"
  workflow_dispatch:
    inputs:
      run-type:
        description: "What to run"
        required: true
        type: choice
        options:
          - dev-deploy
          - ci
          - release
      version:
        description: "Release version (e.g. 1.2.3) — required only for release"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  id-token: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  guard-main:
    if: github.event_name == 'workflow_dispatch' && inputs.run-type == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release runs from main with a version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Release workflow must be run from the main branch."
            exit 1
          fi
          if [ -z "$INPUT_VERSION" ]; then
            echo "::error::Version input is required for release run-type."
            exit 1
          fi

  version-check:
    if: github.event_name == 'workflow_dispatch' && inputs.run-type == 'release'
    needs: [guard-main]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_version-check.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      service-name: user-service
      version: ${{ inputs.version }}

  sast:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run-type == 'ci')
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_sast.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      service-path: services/user-service
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run-type == 'ci')
    needs: [sast]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_sca.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      service-name: user-service
      service-path: services/user-service
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run-type == 'ci')
    needs: [sca]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_docker-build.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      service-name: user-service
      dockerfile: docker/user-service/Dockerfile
      context: services/user-service

  notify-sast:
    if: >-
      always() &&
      (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run-type == 'ci')) &&
      needs.sast.outputs.quality-gate-failed == 'true'
    needs: [sast]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_notify.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      subject: "[SAST] SonarCloud quality gate failed — user-service"
      body: "The SonarCloud SAST quality gate failed. Review the findings in SonarCloud before merging."
      service-name: user-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

  notify-sca:
    if: >-
      always() &&
      (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run-type == 'ci')) &&
      (needs.sca.outputs.critical-found == 'true' || needs.sca.result == 'failure')
    needs: [sca]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_notify.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      subject: "[Snyk] Critical dependency vulnerabilities — user-service"
      body: "Snyk SCA found CRITICAL dependency vulnerabilities. Review and remediate before merging."
      service-name: user-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

  pr-comment:
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [sast, sca, trivy]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_pr-comment.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      service-name: user-service
      sast: ${{ needs.sast.result }}
      sca: ${{ needs.sca.result }}
      trivy: ${{ needs.trivy.result }}

  deploy-dev:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.run-type == 'dev-deploy')
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_dev-deploy-backend.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      service-name: user-service
      chart: user-service
      image-name: ai-travel/user-service
      dockerfile: docker/user-service/Dockerfile
      context: services/user-service
      image-tag: ${{ github.sha }}
      argocd-app: dev-user-service
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}

  publish:
    if: github.event_name == 'workflow_dispatch' && inputs.run-type == 'release'
    needs: [version-check]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_docker-publish.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      image-name: ai-travel/user-service
      tag: v${{ inputs.version }}
      dockerfile: docker/user-service/Dockerfile
      context: services/user-service
      deploy-environment: prod
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  tag:
    if: github.event_name == 'workflow_dispatch' && inputs.run-type == 'release'
    needs: [publish]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_tag.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      service-name: user-service
      version: ${{ inputs.version }}

  prod-approval:
    if: github.event_name == 'workflow_dispatch' && inputs.run-type == 'release'
    needs: [tag]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_production-gate.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      service-name: user-service

  cd:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-type == 'release' && needs.publish.result == 'success' }}
    needs: [publish, tag, prod-approval]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_cd.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      chart: user-service
      image-tag: v${{ inputs.version }}
      deploy-environment: prod
      values-file: values-prod.yaml
    secrets:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}

  smoke-test-prod:
    if: github.event_name == 'workflow_dispatch' && inputs.run-type == 'release'
    needs: [cd]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_smoke-test.yml@99dd98456cf1690eb3a89ef4545298046c1553d0
    with:
      target-environment: prod
      ecr-image: ai-travel/user-service
      ecr-tag: v${{ inputs.version }}
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
