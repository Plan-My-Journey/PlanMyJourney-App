name: Deploy Frontend

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

jobs:
  deploy-frontend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/reusable-frontend-deploy.yml@main
    with:
      environment: production
      frontend_bucket: ai-travel-frontend-prod
      cloudfront_distribution_id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_PROD }}
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ai-travel-github-actions-prod
