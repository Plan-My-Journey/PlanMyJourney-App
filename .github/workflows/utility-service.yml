name: CI/CD - utility-service

# Pull request to dev or main -> validate only (SAST -> SCA -> build image + Trivy)
# Push to dev              -> build, push SHA tag to ECR, GitOps dev deploy
# Merge to main            -> nothing runs (no push trigger on main)
# workflow_dispatch        -> version guard -> publish semver -> git tag -> prod CD

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "services/utility-service/**"
      - "docker/utility-service/**"
      - ".github/workflows/utility-service.yml"
  push:
    branches: [dev]
    paths:
      - "services/utility-service/**"
      - "docker/utility-service/**"
      - ".github/workflows/utility-service.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  id-token: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  guard-main:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release runs from main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Release workflow must be run from the main branch."
            exit 1
          fi

  version-check:
    if: github.event_name == 'workflow_dispatch'
    needs: [guard-main]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_version-check.yml@main
    with:
      service-name: utility-service
      version: ${{ inputs.version }}

  sast:
    if: github.event_name == 'pull_request'
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_sast.yml@main
    with:
      service-path: services/utility-service
      fail-on-quality-gate: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca:
    if: github.event_name == 'pull_request'
    needs: [sast]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_sca.yml@main
    with:
      service-name: utility-service
      service-path: services/utility-service
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy:
    if: github.event_name == 'pull_request'
    needs: [sca]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_docker-build.yml@main
    with:
      service-name: utility-service
      dockerfile: docker/utility-service/Dockerfile
      context: services/utility-service

  notify-sast:
    if: ${{ always() && github.event_name == 'pull_request' && needs.sast.outputs.quality-gate-failed == 'true' }}
    needs: [sast]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_notify.yml@main
    with:
      subject: "[SAST] SonarCloud quality gate failed — utility-service"
      body: "The SonarCloud SAST quality gate failed on this pull request. Review the findings in SonarCloud before merging."
      service-name: utility-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

  notify-sca:
    if: ${{ always() && github.event_name == 'pull_request' && (needs.sca.outputs.critical-found == 'true' || needs.sca.result == 'failure') }}
    needs: [sca]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_notify.yml@main
    with:
      subject: "[Snyk] Critical dependency vulnerabilities — utility-service"
      body: "Snyk SCA found CRITICAL dependency vulnerabilities on this pull request. Review and remediate before merging."
      service-name: utility-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

  pr-comment:
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [sast, sca, trivy]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_pr-comment.yml@main
    with:
      service-name: utility-service
      sast: ${{ needs.sast.result }}
      sca: ${{ needs.sca.result }}
      trivy: ${{ needs.trivy.result }}

  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_dev-deploy-backend.yml@main
    with:
      service-name: utility-service
      chart: utility-service
      image-name: ai-travel/utility-service
      dockerfile: docker/utility-service/Dockerfile
      context: services/utility-service
      image-tag: ${{ github.sha }}
      argocd-app: dev-utility-service
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}

  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: [version-check]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_docker-publish.yml@main
    with:
      image-name: ai-travel/utility-service
      tag: v${{ inputs.version }}
      dockerfile: docker/utility-service/Dockerfile
      context: services/utility-service
      deploy-environment: prod
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  tag:
    if: github.event_name == 'workflow_dispatch'
    needs: [publish]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_tag.yml@main
    with:
      service-name: utility-service
      version: ${{ inputs.version }}

  prod-approval:
    if: github.event_name == 'workflow_dispatch'
    needs: [tag]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_production-gate.yml@main
    with:
      service-name: utility-service

  cd:
    if: ${{ github.event_name == 'workflow_dispatch' && needs.publish.result == 'success' }}
    needs: [publish, tag, prod-approval]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_cd.yml@main
    with:
      chart: utility-service
      image-tag: v${{ inputs.version }}
      deploy-environment: prod
      values-file: values-prod.yaml
    secrets:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}

  smoke-test-prod:
    if: github.event_name == 'workflow_dispatch'
    needs: [cd]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_smoke-test.yml@main
    with:
      target-environment: prod
      ecr-image: ai-travel/utility-service
      ecr-tag: v${{ inputs.version }}
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
