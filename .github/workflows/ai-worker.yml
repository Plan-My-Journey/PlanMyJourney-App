name: CI - ai-worker

# Validation only on PRs. Deployed via ai-service (GitOps bumps ai-worker chart).

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "services/ai-service/app/worker/**"
      - ".github/workflows/ai-worker.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_lint.yml@main
    with:
      service-path: services/ai-service
      runtime: python

  sast:
    needs: [lint]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_sast.yml@main
    with:
      service-path: services/ai-service/app/worker
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  pr-comment:
    if: always()
    needs: [lint, sast]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_pr-comment.yml@main
    with:
      service-name: ai-worker
      lint: ${{ needs.lint.result }}
      sast: ${{ needs.sast.result }}
      sca: skipped
      trivy: skipped

  notify-sast:
    if: ${{ always() && needs.sast.outputs.quality-gate-failed == 'true' }}
    needs: [sast]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_notify.yml@main
    with:
      subject: "[SAST] SonarCloud quality gate failed — ai-worker"
      body: "SonarCloud quality gate failed on this pull request."
      service-name: ai-worker
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
# ci: trigger dev pipelines
