name: Release — Manual Production

# Trigger: workflow_dispatch on main branch only
# Production deploys ONLY through this workflow after manual approval.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Platform release version (e.g. 1.0.0 or v1.0.0)
        required: true
        type: string

concurrency:
  group: release-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  guard-main:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release runs from main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Release workflow must be run from the main branch."
            exit 1
          fi

  resolve-base:
    needs: [guard-main]
    runs-on: ubuntu-latest
    outputs:
      base-ref: ${{ steps.base.outputs.base-ref }}
      version: ${{ steps.base.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Resolve previous platform tag and normalized version
        id: base
        env:
          RAW: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${RAW#v}"
          git fetch --tags --force >/dev/null 2>&1 || true
          LAST="$(git tag -l 'platform-v*' | sort -V | tail -n1)"
          if [ -n "$LAST" ]; then
            BASE="$(git rev-list -n1 "$LAST")"
          else
            BASE="$(git rev-list --max-parents=0 HEAD)"
          fi
          echo "base-ref=${BASE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release base ref: ${BASE} (after ${LAST:-initial commit})"

  version-check:
    needs: [resolve-base]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_platform-version-check.yml@main
    with:
      version: ${{ needs.resolve-base.outputs.version }}

  detect-changes:
    needs: [resolve-base, version-check]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_detect-changed-services.yml@main
    with:
      base-ref: ${{ needs.resolve-base.outputs.base-ref }}
      head-ref: ${{ github.sha }}

  release-backend:
    needs: [detect-changes, resolve-base]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    if: matrix.deploy-type == 'container'
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_release-backend-service.yml@main
    with:
      service-name: ${{ matrix.service }}
      image-name: ${{ matrix.image }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}
      version: ${{ needs.resolve-base.outputs.version }}
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  release-frontend:
    needs: [detect-changes, resolve-base]
    if: contains(needs.detect-changes.outputs.services, 'frontend')
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_release-frontend.yml@main
    with:
      version: ${{ needs.resolve-base.outputs.version }}
      source-bucket: ${{ vars.FRONTEND_BUCKET_DEV || 'ai-travel-frontend-dev' }}
      destination-bucket: ${{ vars.FRONTEND_BUCKET_PROD || 'invest-iq-online-frontend' }}
      cloudfront-distribution-id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_PROD || 'E22TQX283Z4MH2' }}
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  platform-tag:
    needs: [release-backend, release-frontend, resolve-base]
    if: |
      always() &&
      (needs.release-backend.result == 'success' || needs.release-backend.result == 'skipped') &&
      (needs.release-frontend.result == 'success' || needs.release-frontend.result == 'skipped')
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_platform-tag.yml@main
    with:
      version: ${{ needs.resolve-base.outputs.version }}

  prod-approval:
    needs: [platform-tag]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_production-gate.yml@main
    with:
      service-name: platform

  gitops-prod:
    needs: [prod-approval, detect-changes, resolve-base]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    if: matrix.deploy-type == 'container'
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_cd.yml@main
    with:
      chart: ${{ matrix.chart }}
      image-tag: v${{ needs.resolve-base.outputs.version }}
      deploy-environment: prod
      values-file: values-prod.yaml
      additional-charts: ${{ matrix.additional-charts }}
    secrets:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}

  smoke-test-prod:
    needs: [gitops-prod, release-frontend]
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_smoke-test.yml@main
    with:
      target-environment: prod
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
