name: Dev Deploy

# Trigger: push to dev (after feature/* → dev merge)
# Builds and deploys ONLY changed services with tag dev-<short_sha>

on:
  push:
    branches: [dev]

concurrency:
  group: dev-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write
  statuses: write

env:
  WORKFLOWS_REPO: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows

jobs:
  detect-changes:
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_detect-changed-services.yml@main
    with:
      base-ref: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || github.sha }}
      head-ref: ${{ github.sha }}

  prepare-tag:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
    steps:
      - name: Compute dev image tag
        id: tag
        run: echo "image-tag=dev-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

  deploy-backend:
    needs: [detect-changes, prepare-tag]
    if: needs.detect-changes.outputs.container-matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.container-matrix) }}
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_dev-deploy-backend.yml@main
    with:
      service-name: ${{ matrix.service }}
      chart: ${{ matrix.chart }}
      image-name: ${{ matrix.image }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}
      image-tag: ${{ needs.prepare-tag.outputs.image-tag }}
      argocd-app: ${{ matrix.argocd-app }}
      additional-charts: ${{ matrix.additional-charts }}
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}

  deploy-frontend:
    needs: [detect-changes, prepare-tag]
    if: contains(needs.detect-changes.outputs.services, 'frontend')
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_dev-deploy-frontend.yml@main
    with:
      artifact-tag: ${{ needs.prepare-tag.outputs.image-tag }}
      frontend-bucket: ${{ vars.FRONTEND_BUCKET_DEV || 'ai-travel-frontend-dev' }}
      cloudfront-distribution-id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_DEV || 'PLACEHOLDER' }}
      api-url: https://dev-api.invest-iq.online/api
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  no-changes:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.count == '0'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No service changes detected — dev deploy skipped."
