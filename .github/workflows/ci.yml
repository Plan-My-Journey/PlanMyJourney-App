name: CI — Pull Request to dev

# Trigger: feature/* → dev (any PR targeting dev)
# Stages: detect changes → SonarCloud → Snyk → quality gate → PR comment
# No Docker build on pull requests.

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_detect-changed-services.yml@main
    with:
      base-ref: ${{ github.event.pull_request.base.sha }}
      head-ref: ${{ github.event.pull_request.head.sha }}

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Gitleaks secrets scan
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --source . --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --redact --verbose

  ci-scan:
    needs: [detect-changes, gitleaks]
    if: needs.detect-changes.outputs.count != '0'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_ci-service-pull-request.yml@main
    with:
      service-name: ${{ matrix.service }}
      service-path: ${{ matrix.service-path }}
      sast-path: ${{ matrix.sast-path }}
      runtime: ${{ matrix.runtime }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  no-changes:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.count == '0'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No deployable service paths changed — CI checks skipped."
